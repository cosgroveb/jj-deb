name: Build Debian packages

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "jj-starship tag, branch, or commit"
        required: true
        default: "v0.7.1"
      package_revision:
        description: "Debian package revision"
        required: true
        default: "1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suite }}
    runs-on: ubuntu-latest
    container: debian:${{ matrix.suite }}
    strategy:
      fail-fast: false
      matrix:
        suite:
          - bookworm
          - trixie
          - sid

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            dpkg-dev \
            git \
            build-essential \
            pkg-config \
            zlib1g-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain 1.89.0
          printf '%s\n' "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Check out packaging repository
        uses: actions/checkout@v4

      - name: Build package
        env:
          SUITE: ${{ matrix.suite }}
          UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || github.ref_name }}
          PACKAGE_REVISION: ${{ github.event.inputs.package_revision || '1' }}
        run: scripts/build-package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: jj-starship-${{ matrix.suite }}
          path: dist/*.deb
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jj-starship-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
